<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" role="img" aria-label="white moon and stars candle with flame">
  <defs>
    <linearGradient id="wax" x1="0" x2="1">
      <stop offset="0" stop-color="#d9d5cc"/>
      <stop offset="0.22" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#f0ece3"/>
      <stop offset="0.78" stop-color="#fffefa"/>
      <stop offset="1" stop-color="#d6d0c4"/>
    </linearGradient>
    <radialGradient id="top" cx="50%" cy="45%" r="62%">
